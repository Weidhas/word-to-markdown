  <!-- decorative dots -->
  <circle cx="10.5" cy="21.5" r="2.2" fill="#fbbf24" clip-path="url(#eggClip)"/>
  <circle cx="16" cy="23" r="2.2" fill="#f9a8d4" clip-path="url(#eggClip)"/>
  <circle cx="21.5" cy="21.5" r="2.2" fill="#fbbf24" clip-path="url(#eggClip)"/>
</svg>
