<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Word To Markdown</title>
  <defs>
    <clipPath id="eggClip">
      <ellipse cx="16" cy="17.5" rx="11" ry="13.5"/>
    </clipPath>
  </defs>
  <!-- egg body -->
  <ellipse cx="16" cy="17.5" rx="11" ry="13.5" fill="#22c55e"/>
  <!-- horizontal stripe -->
