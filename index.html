<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word To Markdown</title>
    <meta
      name="robots"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0, noai, noimageai"
    />
    <meta
      name="googlebot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0"
    />
    <meta
      name="bingbot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex, max-snippet:0, max-image-preview:none, max-video-preview:0"
    />
    <meta
      name="description"
      content="Konvertiere .docx lokal im Browser zu Markdown. Kein Datei-Upload, kein Server-Processing."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>Word To Markdown</h1>
      </header>

      <section class="privacy-banner" aria-label="Datenschutzhinweis">
        <strong>Privacy:</strong> Die Umwandlung erfolgt ausschließlich clientseitig im Browser.
      </section>

      <section class="grid" aria-label="Konvertierung">
        <article class="panel left-panel">
          <h2>Datei</h2>

          <label class="dropzone" id="dropzone" for="docxInput">
            <input id="docxInput" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
            <span class="drop-title">Datei hier ablegen</span>
            <span class="drop-subtitle">oder klicken, um eine .docx Datei zu wählen</span>
          </label>

          <div class="file-meta" id="fileMeta" hidden>
            <p><strong>Datei:</strong> <span id="fileName">-</span></p>
            <p><strong>Größe:</strong> <span id="fileSize">-</span></p>
          </div>

          <div class="actions">
            <button id="clearBtn" class="btn btn-ghost" disabled>Zurücksetzen</button>
          </div>

          <p id="status" class="status" role="status" aria-live="polite"></p>
        </article>

        <article class="panel right-panel">
          <div class="output-head">
            <h2>Markdown</h2>
            <div class="actions">
              <button id="copyBtn" class="btn btn-ghost" disabled>Kopieren</button>
              <button id="previewBtn" class="btn btn-ghost" disabled aria-pressed="false">Vorschau</button>
              <button id="downloadBtn" class="btn btn-primary" disabled>.md herunterladen</button>
            </div>
          </div>

          <div id="markdownPreview" class="markdown-preview" hidden aria-live="polite"></div>

          <textarea
            id="markdownOutput"
            class="markdown-output"
            spellcheck="false"
            placeholder="Hier erscheint das Markdown..."
          ></textarea>
        </article>
      </section>

      <footer class="site-footer" aria-label="Footer">
        <p>
          Made with &lt;3 with GitHub Copilot
          <span aria-hidden="true">|</span>
          <a href="https://github.com/Weidhas/Word-To-Markdown" target="_blank" rel="noopener noreferrer">GitHub Repo</a>
          <span aria-hidden="true">|</span>
          <a href="https://lurz.at" target="_blank" rel="noopener noreferrer">lurz.at</a>
        </p>
      </footer>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
